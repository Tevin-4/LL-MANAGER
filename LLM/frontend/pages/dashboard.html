<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Football League Manager</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/mobile.css" />
</head>

<body>
  <!-- Top Header -->
  <header class="site-header">
    <img id="logo" src="../Logo.ico">
    <div class="brand">LL MANAGER</div>
    <div class="mobile-avatar-menu">
      <div class="mobile-avatar-icon">—</div>
    </div>
    <!-- Desktop Navigation (hidden on mobile) -->
    <nav style="display: none;">
      <a href="dashboard.html" data-page="dashboard.html">Dashboard</a>
      <a href="leagues.html" data-page="leagues.html">Leagues</a>
      <a href="teams.html" data-page="teams.html">Teams</a>
      <a href="players.html" data-page="players.html">Players</a>
      <a href="matches.html" data-page="matches.html">Matches</a>
      <a href="standings.html" data-page="standings.html">Standings</a>
      <select data-league-select style="width:auto;display:inline-block;margin:0 0.5rem;"></select>
      <span data-nav-user style="color:#fff;align-self:center;font-size:0.85rem;"></span>
      <a href="../index.html" data-nav-login>Login</a>
      <a href="#" data-nav-logout style="display:none;">Logout</a>
    </nav>
  </header>

  <!-- Sticky League Switcher -->
  <div class="mobile-league-filter">
    <select data-league-select></select>
  </div>

  <!-- Main Content -->
  <main>
    <div class="page-header">
      <h1>League Dashboard</h1>
    </div>
    <div id="dashboard-error" class="alert"></div>

    <div class="dashboard-cards">
      <a href="teams.html" class="card-link">
        <div class="stat-card">
          <div class="stat-value" id="stat-teams">—</div>
          <div class="stat-label">Teams</div>
        </div>
      </a>
      <a href="players.html" class="card-link">
        <div class="stat-card">
          <div class="stat-value" id="stat-players">—</div>
          <div class="stat-label">Players</div>
        </div>
      </a>
      <a href="matches.html" class="card-link">
        <div class="stat-card">
          <div class="stat-value" id="stat-matches">—</div>
          <div class="stat-label">Matches Played</div>
        </div>
      </a>
      <div class="stat-card">
        <div class="stat-value" id="stat-upcoming">—</div>
        <div class="stat-label">Upcoming Fixtures</div>
      </div>
    </div>

    <h2>Top of the Table</h2>
    <div id="dashboard-standings">
      <p class="loading">Loading...</p>
    </div>

    <h2>Next Fixtures</h2>
    <div id="dashboard-fixtures">
      <p class="loading">Loading...</p>
    </div>
  </main>

  <!-- Bottom Tab Bar Navigation -->
  <div class="mobile-tab-bar">
    <a href="dashboard.html" class="mobile-tab-item active" data-page="dashboard.html">
      <span class="mobile-tab-icon"><img id="home" src="../home.ico"></span>
      <span>Home</span>
    </a>
    <a href="matches.html" class="mobile-tab-item" data-page="matches.html">
      <span class="mobile-tab-icon"><img id="football-player" src="../football-player.ico"></span>
      <span>Matches</span>
    </a>
    <a href="standings.html" class="mobile-tab-item" data-page="standings.html">
      <span class="mobile-tab-icon"><img id="leaderboard" src="../leaderboard.ico"></span>
      <span>Table</span>
    </a>
    <button class="mobile-tab-item" id="manage-tab">
      <span class="mobile-tab-icon"><img id="supply-chain" src="../supply-chain.ico"></span>
      <span>Manage</span>
    </button>
  </div>

  <!-- Overlay for Bottom Sheet -->
  <div class="mobile-overlay"></div>

  <!-- Bottom Sheet Menu -->
  <div class="mobile-bottom-sheet">
    <div class="mobile-bottom-sheet-header">
      <span>Account & Settings</span>
      <button class="mobile-bottom-sheet-close">✕</button>
    </div>
    <div class="mobile-bottom-sheet-content">
      <a href="leagues.html" class="mobile-bottom-sheet-item">
        <span><img id="population-globe" src="../population-globe.ico"></span> Leagues
      </a>
      <a href="teams.html" class="mobile-bottom-sheet-item">
        <span><img id="hands-together" src="../hands-together.ico"></span> Teams
      </a>
      <a href="players.html" class="mobile-bottom-sheet-item">
        <span><img id="users-medical" src="../users-medical.ico"></span> Players
      </a>
      <button class="mobile-bottom-sheet-item mobile-logout-btn">
        <span><img id="sign-out-alt" src="../sign-out-alt.ico"></span> Logout
      </button>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Setup manage tab to open bottom sheet
    document.getElementById("manage-tab").addEventListener("click", () => {
      document.querySelector(".mobile-bottom-sheet").classList.add("active");
      document.querySelector(".mobile-overlay").classList.add("active");
    });

    async function loadDashboard() {
      const errorEl = document.getElementById("dashboard-error");
      const leagueId = App.getSelectedLeagueId();
      if (!leagueId) {
        document.getElementById("dashboard-standings").innerHTML =
          `<p class="empty-state">Create a league first (see the Leagues page).</p>`;
        document.getElementById("dashboard-fixtures").innerHTML = "";
        return;
      }
      try {
        const [teams, players, matches, standings] = await Promise.all([
          API.getTeams({ league_id: leagueId }),
          API.getPlayers({ league_id: leagueId }),
          API.getMatches({ league_id: leagueId }),
          API.getStandings(leagueId),
        ]);

        const completed = matches.filter((m) => m.status === "completed");
        const upcoming = matches
          .filter((m) => m.status === "scheduled")
          .sort((a, b) => new Date(a.match_date) - new Date(b.match_date));

        document.getElementById("stat-teams").textContent = teams.length;
        document.getElementById("stat-players").textContent = players.length;
        document.getElementById("stat-matches").textContent = completed.length;
        document.getElementById("stat-upcoming").textContent = upcoming.length;

        const standingsEl = document.getElementById("dashboard-standings");
        const top5 = standings.slice(0, 5);
        standingsEl.innerHTML = top5.length
          ? `<table class="data-table"><thead><tr><th>#</th><th>Team</th><th>P</th><th>GD</th><th>Pts</th></tr></thead><tbody>${top5
            .map((r) => `<tr><td>${r.position}</td><td>${App.escapeHtml(r.team_name)}</td><td>${r.matches_played}</td><td>${r.goal_difference > 0 ? "+" : ""}${r.goal_difference}</td><td>${r.points}</td></tr>`)
            .join("")}</tbody></table>`
          : `<p class="empty-state">No standings yet.</p>`;

        const fixturesEl = document.getElementById("dashboard-fixtures");
        const next5 = upcoming.slice(0, 5);
        fixturesEl.innerHTML = next5.length
          ? next5
            .map(
              (m) => `
              <div class="card match-card">
                <div class="match-teams"><span>${App.escapeHtml(m.home_team_name)}</span><span class="score">vs</span><span>${App.escapeHtml(m.away_team_name)}</span></div>
                <div class="match-meta"><span>${App.formatDate(m.match_date)}</span>${m.stadium ? `<span>${App.escapeHtml(m.stadium)}</span>` : ""}</div>
              </div>`
            )
            .join("")
          : `<p class="empty-state">No upcoming fixtures.</p>`;
      } catch (err) {
        App.showError(errorEl, err.message);
      }
    }

    document.addEventListener("DOMContentLoaded", () => setTimeout(loadDashboard, 0));
    document.addEventListener("league-changed", loadDashboard);
  </script>
</body>

</html>
