<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matches - Football League Manager</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <link rel="stylesheet" href="../css/mobile.css" />
</head>

<body>
  <!-- Top Header -->
  <header class="site-header">
    <img id="logo" src="../Logo.ico">
    <div class="brand">LL MANAGER</div>
    <div class="mobile-avatar-menu">
      <div class="mobile-avatar-icon">—</div>
    </div>
    <!-- Desktop Navigation (hidden on mobile) -->
    <nav style="display: none;">
      <a href="dashboard.html" data-page="dashboard.html">Dashboard</a>
      <a href="leagues.html" data-page="leagues.html">Leagues</a>
      <a href="teams.html" data-page="teams.html">Teams</a>
      <a href="players.html" data-page="players.html">Players</a>
      <a href="matches.html" data-page="matches.html">Matches</a>
      <a href="standings.html" data-page="standings.html">Standings</a>
      <select data-league-select style="width:auto;display:inline-block;margin:0 0.5rem;"></select>
      <span data-nav-user style="color:#fff;align-self:center;font-size:0.85rem;"></span>
      <a href="../index.html" data-nav-login>Login</a>
      <a href="#" data-nav-logout style="display:none;">Logout</a>
    </nav>
  </header>

  <!-- Sticky League Switcher -->
  <div class="mobile-league-filter">
    <select data-league-select></select>
  </div>

  <main>
    <div class="page-header">
      <h1>Matches</h1>
    </div>

    <div id="matches-error" class="alert"></div>
    <div id="matches-success" class="alert"></div>

    <form id="match-form" class="entity-form" data-manage-only style="display:none;">
      <h2 id="match-form-title">Schedule Match</h2>
      <input type="hidden" name="match_id" value="" />
      <div class="form-row">
        <div>
          <label for="match-home">Home Team *</label>
          <select id="match-home" name="home_team_id" required>
            <option value="">Select team</option>
          </select>
        </div>
        <div>
          <label for="match-away">Away Team *</label>
          <select id="match-away" name="away_team_id" required>
            <option value="">Select team</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div>
          <label for="match-date">Date &amp; Time *</label>
          <input type="datetime-local" id="match-date" name="match_date" required />
        </div>
        <div>
          <label for="match-stadium">Stadium</label>
          <input type="text" id="match-stadium" name="stadium" />
        </div>
      </div>
      <div class="form-row">
        <div>
          <label for="match-status">Status</label>
          <select id="match-status" name="status">
            <option value="scheduled">Scheduled</option>
            <option value="ongoing">Ongoing</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div>
          <label for="match-home-score">Home Score</label>
          <input type="number" id="match-home-score" name="home_team_score" min="0" value="0" />
        </div>
        <div>
          <label for="match-away-score">Away Score</label>
          <input type="number" id="match-away-score" name="away_team_score" min="0" value="0" />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit">Save Match</button>
        <button type="button" class="btn-secondary" id="match-form-cancel">Cancel</button>
      </div>
    </form>

    <div id="matches-list" class="grid">
      <p class="loading">Loading matches...</p>
    </div>
  </main>

  <!-- Bottom Tab Bar Navigation -->
  <div class="mobile-tab-bar">
    <a href="dashboard.html" class="mobile-tab-item active" data-page="dashboard.html">
      <span class="mobile-tab-icon"><img id="home" src="../home.ico"></span>
      <span>Home</span>
    </a>
    <a href="matches.html" class="mobile-tab-item" data-page="matches.html">
      <span class="mobile-tab-icon"><img id="football-player" src="../football-player.ico"></span>
      <span>Matches</span>
    </a>
    <a href="standings.html" class="mobile-tab-item" data-page="standings.html">
      <span class="mobile-tab-icon"><img id="leaderboard" src="../leaderboard.ico"></span>
      <span>Table</span>
    </a>
    <button class="mobile-tab-item" id="manage-tab">
      <span class="mobile-tab-icon"><img id="supply-chain" src="../supply-chain.ico"></span>
      <span>Manage</span>
    </button>
  </div>

  <!-- Overlay for Bottom Sheet -->
  <div class="mobile-overlay"></div>

  <!-- Bottom Sheet Menu -->
  <div class="mobile-bottom-sheet">
    <div class="mobile-bottom-sheet-header">
      <span>Account & Settings</span>
      <button class="mobile-bottom-sheet-close">✕</button>
    </div>
    <div class="mobile-bottom-sheet-content">
      <a href="leagues.html" class="mobile-bottom-sheet-item">
        <span><img id="population-globe" src="../population-globe.ico"></span> Leagues
      </a>
      <a href="teams.html" class="mobile-bottom-sheet-item">
        <span><img id="hands-together" src="../hands-together.ico"></span> Teams
      </a>
      <a href="players.html" class="mobile-bottom-sheet-item">
        <span><img id="users-medical" src="../users-medical.ico"></span> Players
      </a>
      <button class="mobile-bottom-sheet-item mobile-logout-btn">
        <span><img id="sign-out-alt" src="../sign-out-alt.ico"></span> Logout
      </button>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/matches.js"></script>
  <script>
    // Setup manage tab to open bottom sheet
    document.getElementById("manage-tab").addEventListener("click", () => {
      document.querySelector(".mobile-bottom-sheet").classList.add("active");
      document.querySelector(".mobile-overlay").classList.add("active");
    });
  </script>
</body>

</html>
