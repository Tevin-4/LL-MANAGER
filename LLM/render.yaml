services:
  # 1. Flask Backend API Web Service
  - type: web
    name: football-league-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    rootDir: football_league
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

  # 2. Static Frontend Website
  - type: web
    name: football-league-frontend
    runtime: static
    buildCommand: "" # No build step required
    staticPublishPath: frontend

